<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Camera Monitor</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="Camera navigation">
        <div class="brand-block">
          <div class="brand-mark">TM</div>
          <div>
            <h1>TM Automotive Seating Systems Pvt. Ltd</h1>
            <p>Live and recordings</p>
          </div>
        </div>

        <nav class="nav-list">
          <button class="nav-item is-active" type="button" data-view-target="liveView">Live</button>
          <button class="nav-item" type="button" data-view-target="recordingsView">Recordings</button>
        </nav>

        <section class="camera-panel count-panel" aria-labelledby="roomCountTitle">
          <div class="panel-heading-row">
            <h2 id="roomCountTitle">Room Count</h2>
          </div>
          <div class="count-grid" aria-live="polite">
            <div class="count-tile primary-count">
              <span>Persons Inside</span>
              <strong id="personCount">--</strong>
            </div>
            <div id="conditionTile" class="count-tile condition-tile condition-waiting">
              <span>Condition</span>
              <strong id="conditionStatus">Waiting</strong>
            </div>
            <div class="count-tile">
              <span>Entries</span>
              <strong id="entryCount">--</strong>
            </div>
            <div class="count-tile">
              <span>Exits</span>
              <strong id="exitCount">--</strong>
            </div>
          </div>
        </section>

        <div class="sidebar-footer">AONIX PVT LTD</div>
      </aside>

      <section class="monitor">
        <section id="liveView" class="view-panel is-active">
          <section class="video-stage" aria-label="Live camera preview">
            <video id="cameraVideo" controls playsinline muted hidden></video>
            <iframe id="cameraFrame" title="Camera live preview" hidden></iframe>
            <canvas id="detectionOverlay" class="detection-overlay" aria-hidden="true"></canvas>
            <div id="detectionStatus" class="detection-status">AI waiting</div>
            <div id="emptyState" class="empty-state">
              <strong>Connecting live preview</strong>
              <span>Waiting for the fixed camera feed.</span>
            </div>
          </section>
        </section>

        <section id="recordingsView" class="view-panel recordings-view">
          <div class="recordings-layout">
            <section class="recording-player-panel" aria-label="Recorded video playback">
              <video id="recordingPlayer" controls playsinline></video>
              <div id="recordingEmptyState" class="empty-state">
                <strong>No recording selected</strong>
                <span>Select a clip from the list to play it here.</span>
              </div>
            </section>

            <section class="recordings-panel" aria-label="Recorded clips">
              <div class="recordings-header">
                <h3>Recorded Clips</h3>
                <button id="refreshRecordings" class="secondary-button compact-button" type="button">Refresh</button>
              </div>
              <div id="recordingsList" class="recordings-list"></div>
            </section>
          </div>
        </section>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="app.js"></script>
  </body>
</html>
